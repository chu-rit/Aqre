<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqre Puzzle Generator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
            background: #1a1a2e;
            color: #eee;
            overflow-y: auto;
        }
        h1 { color: #00d4aa; margin: 0 0 8px 0; font-size: 20px; }
        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            align-items: center;
            background: #16213e;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .controls .control-group {
            flex: 0 0 auto;
        }
        .controls input, .controls select {
            padding: 4px 8px;
            font-size: 12px;
            width: 80px;
        }
        .spinner-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .spinner-val {
            min-width: 32px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #e0e0e0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            padding: 3px 6px;
        }
        .spinner-btn {
            padding: 0 !important;
            width: 22px !important;
            height: 22px !important;
            font-size: 12px !important;
            line-height: 1 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1) !important;
            color: #ccc !important;
            border: 1px solid rgba(255,255,255,0.2) !important;
            border-radius: 4px !important;
            cursor: pointer;
        }
        .spinner-btn:hover { background: rgba(255,255,255,0.2) !important; }
        .controls button {
            padding: 6px 12px;
            font-size: 12px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 12px; color: #888; }
        input, select {
            padding: 8px 12px;
            border: 1px solid #0f3460;
            border-radius: 5px;
            background: #0f3460;
            color: #fff;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #00d4aa;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .main-content {
            display: grid;
            grid-template-columns: minmax(300px, 1fr) 280px;
            gap: 10px;
            height: auto;
            max-height: 90vh;
        }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        .panel {
            background: #16213e;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            max-height: calc(90vh - 20px);
            overflow: hidden;
        }
        .panel h3 {
            margin: 0 0 8px 0;
            color: #00d4aa;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 6px;
            font-size: 14px;
        }
        .board {
            display: grid;
            gap: 2px;
            margin: 0 auto;
            width: 420px;
            height: 420px;
            background: #000;
        }
        .cell {
            aspect-ratio: 1;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell.white { background: #fff; color: #1a1a2e; }
        .cell.gray { background: #666; color: #fff; }
        .cell.black { background: #000; color: #fff; }
        .cell.empty { background: #1e3a5f; color: #fff; } /* 빈칸: 남색 (검정과 구분) */
        .cell.area-border { border: 2px solid #00d4aa; }
        .cell:hover { opacity: 0.7; }
        .log {
            background: #0f3460;
            border-radius: 4px;
            padding: 6px;
            font-family: monospace;
            font-size: 11px;
            flex: 1;
            min-height: 80px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .log .success { color: #00d4aa; }
        .log .error { color: #e94560; }
        .log .info { color: #888; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
            font-size: 11px;
        }
        .stat-box {
            background: #0f3460;
            padding: 6px;
            border-radius: 4px;
            text-align: center;
        }
        .stat-value { font-size: 16px; font-weight: bold; color: #00d4aa; }
        .stat-label { font-size: 10px; color: #888; }
        .export-section {
            margin-top: 6px;
        }
        .export-section h3 {
            font-size: 11px;
            margin: 0 0 4px 0;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f3460;
            border: 1px solid #0f3460;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
            padding: 6px;
            resize: vertical;
            font-size: 12px;
        }
        .game-mode .controls,
        .game-mode .panel:nth-child(2),
        .game-mode .export-section {
            display: none;
        }
        .game-mode .panel:first-child {
            flex: 1;
        }
        .game-mode .edit-toolbar,
        .game-mode #regenAreasBtn,
        .game-mode #autoTryBtn,
        .game-mode #undoBtn {
            display: none;
        }
        .game-mode .game-rules {
            display: flex !important;
        }
        .game-rules {
            display: none;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .rule-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: #0f3460;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .rule-item.ok { border-color: #00d4aa; color: #00d4aa; }
        .rule-item.violation { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }
        .rule-icon { font-size: 16px; }
        .mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        /* 편집 툴바 */
        .edit-toolbar {
            display: flex;
            gap: 6px;
            align-items: center;
            background: #16213e;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .edit-toolbar.visible { display: flex; }
        .edit-toolbar label { font-size: 11px; color: #00d4aa; font-weight: bold; margin-right: 4px; }
        .tool-btn {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            background: #0f3460;
            color: #aaa;
            border: 1px solid #1a3a6e;
            cursor: pointer;
            font-weight: normal;
            transition: all 0.15s;
        }
        .tool-btn:hover { background: #1a4080; color: #fff; opacity: 1; }
        .tool-btn.active { background: #00d4aa; color: #1a1a2e; border-color: #00d4aa; font-weight: bold; }
        .tool-sep { width: 1px; height: 20px; background: #0f3460; margin: 0 4px; }
        .area-palette {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
        }
        .area-chip {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            font-weight: bold;
            transition: all 0.15s;
        }
        .area-chip.selected { border-color: #fff; transform: scale(1.1); }
        .area-chip.new-area { background: #1a1a2e; color: #00d4aa; border-color: #00d4aa; }
        .cell.edit-highlight { outline: 2px dashed rgba(255,255,200,0.6); outline-offset: -2px; }
        .cell.selected-area-cell { outline: 3px solid yellow; outline-offset: -3px; }
        .req-input {
            width: 36px;
            padding: 1px 3px;
            font-size: 14px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid #00d4aa;
            border-radius: 3px;
            text-align: center;
            position: absolute;
            left: 1px;
            top: 1px;
            z-index: 20;
        }
        .req-widget {
            position: absolute;
            left: 1px;
            top: 1px;
            z-index: 15;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            pointer-events: auto;
            opacity: 1;
        }
        .req-num {
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            line-height: 1;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            -webkit-text-stroke: 1px #000;
            min-width: 18px;
            text-align: center;
        }
        .req-btn {
            width: 16px;
            height: 14px;
            font-size: 11px;
            padding: 0;
            line-height: 1;
            background: rgba(0,212,170,0.85);
            color: #1a1a2e;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s;
        }
        .req-btn:hover { background: #00d4aa; opacity: 1; }
    </style>
</head>
<body>
    <button class="mode-toggle" onclick="toggleTestMode()">제작 모드</button>
    <h1>Aqre Puzzle Generator</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>가로 (Cols)</label>
            <div class="spinner-wrap">
                <button class="spinner-btn" onclick="spinVal('cols',-1,4,8)">▼</button>
                <span class="spinner-val" id="cols-display">6</span>
                <input type="hidden" id="cols" value="6">
                <button class="spinner-btn" onclick="spinVal('cols',1,4,8)">▲</button>
            </div>
        </div>
        <div class="control-group">
            <label>세로 (Rows)</label>
            <div class="spinner-wrap">
                <button class="spinner-btn" onclick="spinVal('rows',-1,4,8)">▼</button>
                <span class="spinner-val" id="rows-display">6</span>
                <input type="hidden" id="rows" value="6">
                <button class="spinner-btn" onclick="spinVal('rows',1,4,8)">▲</button>
            </div>
        </div>
        <div class="control-group">
            <label>영역 개수 (0=랜덤)</label>
            <div class="spinner-wrap">
                <button class="spinner-btn" onclick="spinVal('areaCount',-1,0,20)">▼</button>
                <span class="spinner-val" id="areaCount-display">0</span>
                <input type="hidden" id="areaCount" value="0">
                <button class="spinner-btn" onclick="spinVal('areaCount',1,0,20)">▲</button>
            </div>
        </div>
        <div class="control-group">
            <label>검정 셀 (빈칸=자동)</label>
            <div class="spinner-wrap">
                <button class="spinner-btn" onclick="spinVal('blackCount',-1,-1,30)">▼</button>
                <span class="spinner-val" id="blackCount-display">자동</span>
                <input type="hidden" id="blackCount" value="">
                <button class="spinner-btn" onclick="spinVal('blackCount',1,-1,30)">▲</button>
            </div>
        </div>
        <div class="control-group">
            <label>미할당셀 %</label>
            <div class="spinner-wrap">
                <button class="spinner-btn" onclick="spinVal('unassignedPercent',-5,0,80)">▼</button>
                <span class="spinner-val" id="unassignedPercent-display">0</span>
                <input type="hidden" id="unassignedPercent" value="0">
                <button class="spinner-btn" onclick="spinVal('unassignedPercent',5,0,80)">▲</button>
            </div>
        </div>
        <button id="generateBtn" onclick="generatePuzzle()">랜덤 생성</button>
        <button id="solveBtn" onclick="verifyWithSolver()" disabled>Solver 검증</button>
        <button id="exportBtn" onclick="exportPuzzle()" disabled>보내기</button>
    </div>

    <div class="main-content">
        <div class="panel" oncontextmenu="return false;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <h3 style="margin:0;">미리보기</h3>
                <div style="display:flex;gap:4px;">
                    <button class="tool-btn" onclick="regenAreas()" id="regenAreasBtn" style="font-size:11px;padding:4px 10px;">♻️ 영역재설정</button>
                    <button class="tool-btn" onclick="autoTryRequired()" id="autoTryBtn" style="font-size:11px;padding:4px 10px;">🔄 반복시도</button>
                </div>
            </div>
            <!-- 편집 툴바 -->
            <div class="edit-toolbar" id="editToolbar">
                <label>영역 편집:</label>
                <div class="area-palette" id="areaPalette"></div>
                <button class="tool-btn new-area" onclick="addNewArea()" id="addAreaBtn">+ 새 영역</button>
            </div>
            <div id="board" class="board"></div>
            <div class="game-rules" id="gameRules">
                <div class="rule-item" id="rule4Consecutive"><span class="rule-icon">✓</span> 4연속 금지</div>
                <div class="rule-item" id="ruleAreaRequired"><span class="rule-icon">✓</span> 영역 회색 수</div>
                <div class="rule-item" id="ruleConnectivity"><span class="rule-icon">✓</span> 회색 연결성</div>
            </div>
            <div style="margin-top:6px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                <button class="tool-btn" onclick="undoEdit()" id="undoBtn">↩ 실행 취소</button>
                <button class="tool-btn" onclick="findAndShowSolution()" style="background:#1a3a6e;color:#00d4aa;border-color:#00d4aa;">🔍 답찾기</button>
                <span id="solveProgress" style="font-size:11px;color:#888;min-height:14px;"></span>
            </div>
            <div class="stats" id="stats"></div>
        </div>
        
        <div class="panel">
            <h3>생성 로그</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <div class="panel export-section">
        <h3>퍼즐 데이터 (검증 실패해도 여기서 확인 가능)</h3>
        <div id="validationStatus" style="margin-bottom: 10px; padding: 8px 12px; border-radius: 5px; font-size: 12px; background: #0f3460; color: #888;">
            ⏳ 퍼즐 생성 전...
        </div>
        <textarea id="exportData" placeholder="퍼즐 데이터를 입력하거나 생성 결과가 여기에 표시됩니다"></textarea>
        <div style="margin-top: 10px; display: flex; gap: 10px;">
            <button onclick="loadFromExportData()">미리보기 및 검증</button>
            <button onclick="copyExportData()">복사</button>
            <button onclick="findAndShowSolution()">답 찾기</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api/solve';

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.spinner-wrap').forEach(wrap => {
                wrap.addEventListener('wheel', e => {
                    e.preventDefault();
                    const btn = wrap.querySelector('.spinner-btn');
                    const onclick = btn.getAttribute('onclick');
                    const match = onclick.match(/spinVal\('(\w+)',[-\d]+,(-?\d+),(\d+)\)/);
                    if (!match) return;
                    const [, id, min, max] = match;
                    spinVal(id, e.deltaY < 0 ? 1 : -1, parseInt(min), parseInt(max));
                }, { passive: false });
            });
        });

        function spinVal(id, delta, min, max) {
            const input = document.getElementById(id);
            const display = document.getElementById(id + '-display');
            let cur = input.value === '' ? (id === 'blackCount' ? -1 : 0) : parseInt(input.value);
            cur = Math.max(min, Math.min(max, cur + delta));
            if (id === 'blackCount' && cur <= -1) {
                input.value = '';
                display.textContent = '자동';
            } else {
                input.value = cur;
                display.textContent = cur;
            }
        }
        let currentPuzzle = null;
        let currentSolution = null;
        let allFoundSolutions = [];
        let currentSolutionIdx = 0;
        let generationAttempts = 0;
        const MAX_GENERATION_ATTEMPTS = 15;
        const MAX_VERIFICATION_ATTEMPTS = 5;
        
        // 생성 전략 목록
        const STRATEGIES = [
            { name: 'pattern', weight: 0.3 },
            { name: 'snake', weight: 0.25 },
            { name: 'clusters', weight: 0.25 },
            { name: 'random', weight: 0.2 }
        ];

        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            logEl.innerHTML += `<div class="${className}">[${time}] ${message}</div>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function selectStrategy(retryCount) {
            // 재시도 횟수에 따라 전략 가중치 조정
            if (retryCount < 3) {
                return STRATEGIES[Math.floor(Math.random() * STRATEGIES.length)].name;
            } else if (retryCount < 6) {
                // 실패 시 더 안정적인 전략 선호
                const stable = ['pattern', 'snake'];
                return stable[Math.floor(Math.random() * stable.length)];
            } else {
                // 계속 실패하면 랜덤으로
                return 'random';
            }
        }

        function getRandomAreaCount(size) {
            // 크기에 따라 적절한 영역 개수 범위 설정 - 더 보수적으로
            const minAreas = Math.max(3, Math.floor(size / 2));
            const maxAreas = Math.min(8, size + 1);
            return minAreas + Math.floor(Math.random() * (maxAreas - minAreas + 1));
        }

        function generatePuzzle() {
            const cols = parseInt(document.getElementById('cols').value);
            const rows = parseInt(document.getElementById('rows').value);
            const size = Math.max(rows, cols);
            let areaCount = parseInt(document.getElementById('areaCount').value);
            const blackCountInput = document.getElementById('blackCount').value;
            let targetBlackCount = blackCountInput === '' ? null : parseInt(blackCountInput);

            if (areaCount === 0) areaCount = getRandomAreaCount(size);

            const strategy = selectStrategy(0, targetBlackCount);
            const areaText = document.getElementById('areaCount').value === '0' ? `${areaCount}개 (랜덤)` : `${areaCount}개`;
            const blackText = targetBlackCount !== null ? `${targetBlackCount}개` : '자동';
            log(`퍼즐 생성 시작... (${cols}x${rows}, 영역 ${areaText}, 검정 ${blackText}, 전략: ${strategy})`, 'info');

            // 1. 해답 + 영역 생성 (최대 20회 시도)
            let solution = null, areas = null;
            const strategies = ['pattern', 'snake', 'clusters', 'random'];
            for (let attempt = 0; attempt < 20; attempt++) {
                const s = strategies[attempt % strategies.length];
                let sol;
                try { sol = generateSolutionWithStrategy(size, s, null, targetBlackCount); } catch(e) { continue; }
                if (!sol) continue;
                // 영역 생성 전에 패딩 영역을 2로 표시 (rows/cols 범위 밖)
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++)
                        if (r >= rows || c >= cols) { sol.board[r][c] = 2; }
                // 패딩된 셀을 blackCells에도 반영
                sol.blackCells = [];
                sol.grayCells = [];
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++) {
                        if (sol.board[r][c] === 2) sol.blackCells.push([r, c]);
                        if (sol.board[r][c] === 1) sol.grayCells.push([r, c]);
                    }
                const ar = generateAreasFromSolution(sol, areaCount);
                if (ar.length >= 2) { solution = sol; areas = ar; break; }
            }
            if (!solution || !areas) {
                log('생성 실패. 조건을 바꿔 다시 시도하세요.', 'error');
                return;
            }
            log(`유효한 해답 생성 완료 (회색: ${solution.grayCells.length}개)`, 'success');
            log(`${areas.length}개 영역 생성 완료`, 'success');

            // 3. 빈 퍼즐 생성 (검정 셀만 표시, 나머지는 빈칸)
            const emptyState = generateEmptyState(solution);
            log('빈 퍼즐 생성 (검정 셀만 표시)', 'info');

            // 4. 퍼즐 데이터 구성 (빈 상태로)
            const _now = new Date();
            const _dateBase = parseInt(
                String(_now.getFullYear()).slice(2) +
                String(_now.getMonth() + 1).padStart(2, '0') +
                String(_now.getDate()).padStart(2, '0')
            );
            // 같은 날짜 prefix로 시작하는 id 중 최대값 + 1
            const _existing = (window._generatedIds = window._generatedIds || []);
            const _sameDay = _existing.filter(id => Math.floor(id / 100) === _dateBase);
            const _seq = _sameDay.length > 0 ? (Math.max(..._sameDay) % 100) + 1 : 1;
            const _newId = _dateBase * 100 + Math.min(_seq, 99);
            _existing.push(_newId);

            const _maxDim = Math.max(rows, cols);
            const _difficulty = _maxDim <= 5 ? 1 : _maxDim <= 7 ? 2 : 3;

            currentPuzzle = {
                id: _newId,
                chapter: 1,
                difficulty: _difficulty,
                size: size,
                areas: areas.filter(a => a.cells.length > 0),
                initialState: emptyState
            };
            currentSolution = solution;

            // UI 업데이트 (빈 퍼즐 표시)
            renderBoard(solution, areas, emptyState);
            updateStats(size, areas, emptyState, solution);
            
            // 데이터 표시
            displayPuzzleData();
            updateValidationStatus('pending', `🔍 빈 퍼즐로 Solver 시도 중... (전략: ${strategy})`);

            log('빈 퍼즐 생성 완료! Solver로 해답 검증 중...', 'success');
            
            // 자동 검증 시작 (빈 퍼즐로)

                size, areaCount, strategy, targetBlackCount, solution, areas

        }
        
        function generateEmptyState(solution) {
            const { board, blackCells } = solution;
            const size = board.length;
            
            // 모든 셀을 빈칸(-1)으로 초기화
            const emptyState = Array(size).fill(null).map(() => Array(size).fill(-1));
            
            // 검정 셀만 표시
            for (const [r, c] of blackCells) {
                emptyState[r][c] = 2;
            }
            
            return emptyState;
        }

        function generateSolutionWithStrategy(size, strategy, targetGrayCount = null, targetBlackCount = null) {
            switch (strategy) {
                case 'pattern':
                    return generatePatternSolution(size, targetGrayCount, targetBlackCount);
                case 'snake':
                    return generateSnakeSolution(size, targetGrayCount, targetBlackCount);
                case 'clusters':
                    return generateClustersSolution(size, targetGrayCount, targetBlackCount);
                case 'random':
                default:
                    return generateRandomSolution(size, targetGrayCount, targetBlackCount);
            }
        }

        
        function generatePatternSolution(size, targetGrayCount = null, targetBlackCount = null) {
            // 체크무늬 기반 패턴 생성
            const board = Array(size).fill(null).map(() => Array(size).fill(0));
            
            // 타겟 회색 개수가 있으면 해당 비율에 맞는 패턴 선택/조정
            let targetRatio = targetGrayCount ? targetGrayCount / (size * size) : 0.5;
            targetRatio = Math.max(0.05, Math.min(0.95, targetRatio)); // 5%~95% 범위
            
            // 패턴들을 비율 기반으로 선택
            const patterns = [
                { fn: (r, c) => (r + c) % 2 === 0, ratio: 0.5 }, // 체크무늬
                { fn: (r, c) => (Math.floor(r/2) + Math.floor(c/2)) % 2 === 0, ratio: 0.5 }, // 2x2 블록
                { fn: (r, c) => (r + c) % 3 !== 0, ratio: 0.67 }, // 대각선
                { fn: (r, c) => r % 2 === 0, ratio: 0.5 } // 가로줄
            ];
            
            // 타겟 비율에 가장 가까운 패턴 선택
            let pattern = patterns[0];
            let minDiff = Math.abs(patterns[0].ratio - targetRatio);
            for (const p of patterns) {
                const diff = Math.abs(p.ratio - targetRatio);
                if (diff < minDiff) {
                    minDiff = diff;
                    pattern = p;
                }
            }
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    board[r][c] = pattern.fn(r, c) ? 1 : 0;
                }
            }
            
            removeFourConsecutive(board, size);
            ensureConnected(board, size, []);
            
            // 회색 셀 개수 조정 (타겟에 맞게)
            if (targetGrayCount) {
                adjustGrayCount(board, size, targetGrayCount);
            }
            
            if (!validateSolution(board, size)) {
                return null;
            }
            
            const blackCells = placeBlackCells(board, size, targetBlackCount);
            const grayCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) grayCells.push([r, c]);
                }
            }
            
            return { board: board.map(row => [...row]), grayCells, blackCells };
        }
        
        function adjustGrayCount(board, size, targetGrayCount) {
            // 현재 회색 셀 수 확인
            let currentGray = 0;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) currentGray++;
                }
            }
            
            // 타겟보다 적으면 추가, 많으면 제거
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            if (currentGray < targetGrayCount) {
                // 회색 추가
                const candidates = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0) {
                            // 연결성 확인
                            let adjacentGray = false;
                            for (const [dr, dc] of directions) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr][nc] === 1) {
                                    adjacentGray = true;
                                    break;
                                }
                            }
                            if (adjacentGray) candidates.push([r, c]);
                        }
                    }
                }
                
                candidates.sort(() => Math.random() - 0.5);
                let added = 0;
                for (const [r, c] of candidates) {
                    if (currentGray + added >= targetGrayCount) break;
                    board[r][c] = 1;
                    if (hasFourConsecutive(board, r, c, size)) {
                        board[r][c] = 0;
                    } else {
                        added++;
                    }
                }
            } else if (currentGray > targetGrayCount) {
                // 회색 제거 (가장자리부터)
                const grayCells = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 1) {
                            // 연결된 이웃 수 확인
                            let neighborCount = 0;
                            for (const [dr, dc] of directions) {
                                const nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr][nc] === 1) {
                                    neighborCount++;
                                }
                            }
                            grayCells.push([r, c, neighborCount]);
                        }
                    }
                }
                
                // 이웃 많은 순으로 정렬 (가장자리 제거 우선)
                grayCells.sort((a, b) => a[2] - b[2]);
                
                let removed = 0;
                for (const [r, c, neighbors] of grayCells) {
                    if (currentGray - removed <= targetGrayCount) break;
                    if (neighbors > 0) { // 연결성 유지하며 제거
                        board[r][c] = 0;
                        removed++;
                    }
                }
            }
        }
        
        function generateSnakeSolution(size, targetGrayCount = null, targetBlackCount = null) {
            // 뱀 모양 경로로 회색 셀 배치
            const board = Array(size).fill(null).map(() => Array(size).fill(0));
            const grayCells = [];
            
            let r = 0, c = 0;
            const directions = [[0, 1], [1, 0], [0, -1], [-1, 0]];
            let dirIdx = 0;
            
            const totalCells = size * size;
            const targetGray = targetGrayCount || Math.floor(totalCells * 0.4);
            
            for (let i = 0; i < totalCells && grayCells.length < targetGray; i++) {
                // 현재 위치를 회색으로
                board[r][c] = 1;
                grayCells.push([r, c]);
                
                // 다음 위치 찾기
                let nextR = r + directions[dirIdx][0];
                let nextC = c + directions[dirIdx][1];
                
                // 벽에 닿으면 방향 전환
                if (nextR < 0 || nextR >= size || nextC < 0 || nextC >= size || board[nextR][nextC] === 1) {
                    dirIdx = (dirIdx + 1) % 4;
                    nextR = r + directions[dirIdx][0];
                    nextC = c + directions[dirIdx][1];
                    
                    // 여전히 안되면 랜덤
                    if (nextR < 0 || nextR >= size || nextC < 0 || nextC >= size || board[nextR][nextC] === 1) {
                        const candidates = [];
                        for (const [dr, dc] of [[-1,0], [1,0], [0,-1], [0,1]]) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr][nc] === 0) {
                                candidates.push([nr, nc]);
                            }
                        }
                        if (candidates.length === 0) break;
                        [nextR, nextC] = candidates[Math.floor(Math.random() * candidates.length)];
                    }
                }
                
                r = nextR;
                c = nextC;
            }
            
            removeFourConsecutive(board, size);
            ensureConnected(board, size, []);
            
            // 회색 개수 조정
            if (targetGrayCount) {
                adjustGrayCount(board, size, targetGrayCount);
            }
            
            if (!validateSolution(board, size)) {
                return null;
            }
            
            const blackCells = placeBlackCells(board, size, targetBlackCount);
            grayCells.length = 0;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) grayCells.push([r, c]);
                }
            }
            
            return { board: board.map(row => [...row]), grayCells, blackCells };
        }
        
        function generateClustersSolution(size, targetGrayCount = null, targetBlackCount = null) {
            // 여러 개의 작은 클러스터로 구성
            const board = Array(size).fill(null).map(() => Array(size).fill(0));
            const grayCells = [];
            
            const totalCells = size * size;
            const targetGray = targetGrayCount || Math.floor(totalCells * 0.4);
            
            // 타겟 회색 개수에 따른 클러스터 수와 크기 계산
            const avgClusterSize = 4;
            const numClusters = Math.max(2, Math.floor(targetGray / avgClusterSize));
            const clusterCenters = [];
            
            // 중심점 랜덤 선택 (균등하게 분포)
            for (let i = 0; i < numClusters; i++) {
                clusterCenters.push([
                    Math.floor(Math.random() * size),
                    Math.floor(Math.random() * size)
                ]);
            }
            
            // 각 중심점에서 BFS로 클러스터 생성
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            let totalPlaced = 0;
            
            for (const [cr, cc] of clusterCenters) {
                if (totalPlaced >= targetGray) break;
                
                const remaining = targetGray - totalPlaced;
                const clusterSize = Math.min(3 + Math.floor(Math.random() * 4), remaining);
                const queue = [[cr, cc]];
                const visited = new Set([`${cr},${cc}`]);
                
                if (board[cr][cc] === 0) {
                    board[cr][cc] = 1;
                    grayCells.push([cr, cc]);
                    totalPlaced++;
                }
                
                while (queue.length > 0 && visited.size < clusterSize && totalPlaced < targetGray) {
                    const [r, c] = queue.shift();
                    
                    for (const [dr, dc] of directions) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < size && nc >= 0 && nc < size && 
                            board[nr][nc] === 0 && !visited.has(`${nr},${nc}`)) {
                            board[nr][nc] = 1;
                            grayCells.push([nr, nc]);
                            visited.add(`${nr},${nc}`);
                            queue.push([nr, nc]);
                            totalPlaced++;
                            
                            if (visited.size >= clusterSize || totalPlaced >= targetGray) break;
                        }
                    }
                }
            }
            
            removeFourConsecutive(board, size);
            ensureConnected(board, size, []);
            
            // 회색 개수 조정
            if (targetGrayCount) {
                adjustGrayCount(board, size, targetGrayCount);
            }
            
            if (!validateSolution(board, size)) {
                return null;
            }
            
            const blackCells = placeBlackCells(board, size, targetBlackCount);
            grayCells.length = 0;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) grayCells.push([r, c]);
                }
            }
            
            return { board: board.map(row => [...row]), grayCells, blackCells };
        }
        
        function removeFourConsecutive(board, size) {
            // 가로 4연속 제거
            for (let r = 0; r < size; r++) {
                let count = 1, lastColor = board[r][0];
                for (let c = 1; c < size; c++) {
                    if (board[r][c] === lastColor) {
                        count++;
                        if (count >= 4) {
                            // 반대 색으로 변경
                            board[r][c] = 1 - lastColor;
                            count = 1;
                            lastColor = board[r][c];
                        }
                    } else {
                        count = 1;
                        lastColor = board[r][c];
                    }
                }
            }
            
            // 세로 4연속 제거
            for (let c = 0; c < size; c++) {
                let count = 1, lastColor = board[0][c];
                for (let r = 1; r < size; r++) {
                    if (board[r][c] === lastColor) {
                        count++;
                        if (count >= 4) {
                            board[r][c] = 1 - lastColor;
                            count = 1;
                            lastColor = board[r][c];
                        }
                    } else {
                        count = 1;
                        lastColor = board[r][c];
                    }
                }
            }
        }
        
        function ensureConnected(board, size, grayCells) {
            // 모든 회색 셀이 연결되도록 조정
            const visited = Array(size).fill(null).map(() => Array(size).fill(false));
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            // 첫 회색 셀 찾기
            let startR = -1, startC = -1;
            for (let r = 0; r < size && startR === -1; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) {
                        startR = r; startC = c;
                        break;
                    }
                }
            }
            
            if (startR === -1) return; // 회색 셀 없음
            
            // BFS로 연결된 영역 찾기
            const queue = [[startR, startC]];
            visited[startR][startC] = true;
            const connected = [[startR, startC]];
            
            while (queue.length > 0) {
                const [r, c] = queue.shift();
                for (const [dr, dc] of directions) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && 
                        board[nr][nc] === 1 && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        connected.push([nr, nc]);
                        queue.push([nr, nc]);
                    }
                }
            }
            
            // 연결되지 않은 회색 셀을 연결된 영역에 붙이기
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1 && !visited[r][c]) {
                        // 가장 가까운 연결된 회색 셀 찾아 경로 연결
                        let minDist = Infinity, closest = null;
                        for (const [cr, cc] of connected) {
                            const dist = Math.abs(r - cr) + Math.abs(c - cc);
                            if (dist < minDist) {
                                minDist = dist;
                                closest = [cr, cc];
                            }
                        }
                        
                        if (closest) {
                            // 경로 따라 셀들을 회색으로 변경
                            let [cr, cc] = [r, c];
                            while (cr !== closest[0] || cc !== closest[1]) {
                                if (board[cr][cc] !== 2) {
                                    board[cr][cc] = 1;
                                    connected.push([cr, cc]);
                                }
                                if (cr < closest[0]) cr++;
                                else if (cr > closest[0]) cr--;
                                else if (cc < closest[1]) cc++;
                                else if (cc > closest[1]) cc--;
                            }
                        }
                    }
                }
            }
        }
        
        function placeBlackCells(board, size, targetBlackCount = null) {
            const blackCells = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            // 타겟 검정 셀 개수 (null이면 자동, 0이면 0개)
            const totalCells = size * size;
            const maxBlack = Math.floor(totalCells * 0.12); // 최대 12%로 감소
            const targetBlack = targetBlackCount !== null ? targetBlackCount : Math.min(maxBlack, Math.max(0, Math.floor(size / 4)));
            
            if (targetBlack === 0) return blackCells; // 0개 요청 시 바로 반환
            
            // 후보 셀 수집 - 더 엄격한 조건
            const candidates = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) { // 흰색 셀 중에서
                        // 4연속 규칙 위반 검사 - 검정 배치 시 주변 패턴 확인
                        let canPlace = true;
                        
                        // 가상으로 검정 배치 후 4연속 검정 검사
                        const tempRow = [0,0,0,0,0,0,0,0];
                        const tempCol = [0,0,0,0,0,0,0,0];
                        for (let i = -3; i <= 3; i++) {
                            if (c+i >= 0 && c+i < size) {
                                tempRow[c+i+3] = (i === 0) ? 2 : board[r][c+i];
                            }
                            if (r+i >= 0 && r+i < size) {
                                tempCol[r+i+3] = (i === 0) ? 2 : board[r+i][c];
                            }
                        }
                        
                        // 연속 4개 검정 체크
                        let blackCount = 0;
                        for (let i = 0; i < 8; i++) {
                            if (tempRow[i] === 2) {
                                blackCount++;
                                if (blackCount >= 4) { canPlace = false; break; }
                            } else blackCount = 0;
                        }
                        blackCount = 0;
                        for (let i = 0; i < 8; i++) {
                            if (tempCol[i] === 2) {
                                blackCount++;
                                if (blackCount >= 4) { canPlace = false; break; }
                            } else blackCount = 0;
                        }
                        
                        if (!canPlace) continue;
                        
                        // 회색 셀과 인접한 개수 계산
                        let adjacentGray = 0;
                        let adjacentBlack = 0;
                        for (const [dr, dc] of directions) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
                                if (board[nr][nc] === 1) adjacentGray++;
                                if (board[nr][nc] === 2) adjacentBlack++;
                            }
                        }
                        
                        // 회색과 인접하고, 다른 검정과 인접하지 않은 셀 우선
                        if (adjacentGray >= 1 && adjacentBlack === 0) {
                            candidates.push([r, c, adjacentGray * 10 + (r === 0 || r === size-1 || c === 0 || c === size-1 ? 5 : 0)]);
                        }
                    }
                }
            }
            
            // 우선순위로 정렬
            candidates.sort((a, b) => b[2] - a[2]);
            
            // 하나씩 배치하면서 연결성과 4연속 규칙 검사
            let attempts = 0;
            for (const [r, c, score] of candidates) {
                if (blackCells.length >= targetBlack) break;
                attempts++;
                if (attempts > 50) break; // 시도 횟수 제한
                
                // 일시적으로 검정으로 변경
                const original = board[r][c];
                board[r][c] = 2;
                
                // 연결성 + 4연속 검사
                const connected = isAllNonBlackConnected(board, size);
                const noFour = !hasFourConsecutiveBlack(board, r, c, size);
                
                if (connected && noFour) {
                    blackCells.push([r, c]);
                } else {
                    board[r][c] = original;
                }
            }
            
            return blackCells;
        }
        
        function hasFourConsecutiveBlack(board, row, col, size) {
            // 가로 검사
            let count = 0;
            for (let c = Math.max(0, col-3); c <= Math.min(size-1, col+3); c++) {
                if (board[row][c] === 2) {
                    count++;
                    if (count >= 4) return true;
                } else count = 0;
            }
            // 세로 검사
            count = 0;
            for (let r = Math.max(0, row-3); r <= Math.min(size-1, row+3); r++) {
                if (board[r][col] === 2) {
                    count++;
                    if (count >= 4) return true;
                } else count = 0;
            }
            return false;
        }
        
        function isAllNonBlackConnected(board, size) {
            // 검정 셀을 제외한 모든 셀(회색+흰색)이 연결되어 있는지 확인
            const nonBlackCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] !== 2) { // 검정(2)이 아닌 모든 셀
                        nonBlackCells.push([r, c]);
                    }
                }
            }
            
            if (nonBlackCells.length <= 1) return true;
            
            const visited = Array(size).fill(null).map(() => Array(size).fill(false));
            const queue = [nonBlackCells[0]];
            const [startR, startC] = nonBlackCells[0];
            visited[startR][startC] = true;
            
            let visitedCount = 0;
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            while (queue.length > 0) {
                const [r, c] = queue.shift();
                visitedCount++;
                
                for (const [dr, dc] of directions) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && 
                        board[nr][nc] !== 2 && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            
            return visitedCount === nonBlackCells.length;
        }

        function validateSolution(board, size) {
            // 모든 검증 수행
            const grayCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) {
                        // 4연속 검사
                        if (hasFourConsecutive(board, r, c, size)) return false;
                        grayCells.push([r, c]);
                    }
                }
            }
            
            // 회색 셀 연결성 검사
            if (grayCells.length > 0 && !isConnected(board, grayCells, size)) {
                return false;
            }
            
            // 검정 셀 제외한 모든 셀 연결성 검사
            if (!isAllNonBlackConnected(board, size)) {
                return false;
            }
            
            return true;
        }
        
        function generateRandomSolution(size, targetGrayCount = null, targetBlackCount = null) {
            // 여러 개의 작은 클러스터로 구성
            const board = Array(size).fill(null).map(() => Array(size).fill(0));
            const grayCells = [];
            
            const totalCells = size * size;
            const targetGray = targetGrayCount || Math.floor(totalCells * 0.4);
            const targetClusters = Math.max(3, Math.floor(size / 2)); // 최소 3개 클러스터
            const clusterSize = Math.max(2, Math.floor(targetGray / targetClusters));
            
            for (let attempt = 0; attempt < 1000; attempt++) {
                for (let i = 0; i < size; i++) board[i].fill(0);
                grayCells.length = 0;
                
                // 시작점 후보 (여러 위치에서 시작)
                const startPositions = [];
                for (let r = 1; r < size - 1; r++) {
                    for (let c = 1; c < size - 1; c++) {
                        startPositions.push([r, c]);
                    }
                }
                
                for (let i = startPositions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [startPositions[i], startPositions[j]] = [startPositions[j], startPositions[i]];
                }
                
                // 여러 시작점에서 BFS로 클러스터 생성
                const used = new Set();
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                
                for (let i = 0; i < startPositions.length && grayCells.length < targetGray; i++) {
                    const [sr, sc] = startPositions[i];
                    if (board[sr][sc] === 1) continue;
                    
                    const cluster = [];
                    const queue = [[sr, sc]];
                    board[sr][sc] = 1;
                    cluster.push([sr, sc]);
                    grayCells.push([sr, sc]);
                    
                    while (queue.length > 0 && cluster.length < clusterSize && grayCells.length < targetGray) {
                        const [r, c] = queue.shift();
                        const neighbors = directions
                            .map(([dr, dc]) => [r + dr, c + dc])
                            .filter(([nr, nc]) => nr >= 0 && nr < size && nc >= 0 && nc < size 
                                && board[nr][nc] === 0);
                        
                        for (const [nr, nc] of neighbors) {
                            if (Math.random() < 0.6) {
                                board[nr][nc] = 1;
                                if (!hasFourConsecutive(board, nr, nc, size)) {
                                    cluster.push([nr, nc]);
                                    grayCells.push([nr, nc]);
                                    queue.push([nr, nc]);
                                } else {
                                    board[nr][nc] = 0;
                                }
                            }
                        }
                    }
                }
                
                if (grayCells.length > 0 && isConnected(board, grayCells, size)) {
                    if (targetGrayCount) {
                        adjustGrayCount(board, size, targetGrayCount);
                    }
                    
                    const blackCells = placeBlackCells(board, size, targetBlackCount);
                    
                    grayCells.length = 0;
                    for (let r = 0; r < size; r++) {
                        for (let c = 0; c < size; c++) {
                            if (board[r][c] === 1) grayCells.push([r, c]);
                        }
                    }
                    
                    return { board, grayCells, blackCells };
                }
            }
            return null;
        }

        function hasFourConsecutive(board, row, col, size) {
            const color = board[row][col];
            if (color !== 1) return false;
            
            // 가로 검사
            let count = 1;
            for (let c = col - 1; c >= 0 && board[row][c] === color; c--) count++;
            for (let c = col + 1; c < size && board[row][c] === color; c++) count++;
            if (count >= 4) return true;
            
            // 세로 검사
            count = 1;
            for (let r = row - 1; r >= 0 && board[r][col] === color; r--) count++;
            for (let r = row + 1; r < size && board[r][col] === color; r++) count++;
            if (count >= 4) return true;
            
            return false;
        }

        function isConnected(board, grayCells, size) {
            if (grayCells.length <= 1) return true;
            
            const visited = Array(size).fill(null).map(() => Array(size).fill(false));
            const queue = [grayCells[0]];
            const [startR, startC] = grayCells[0];
            visited[startR][startC] = true;
            
            let visitedCount = 0;
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            while (queue.length > 0) {
                const [r, c] = queue.shift();
                visitedCount++;
                
                for (const [dr, dc] of directions) {
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < size && nc >= 0 && nc < size && 
                        board[nr][nc] === 1 && !visited[nr][nc]) {
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
            
            return visitedCount === grayCells.length;
        }

        function generateAreasFromSolution(solution, targetAreaCount) {
            const { board, grayCells } = solution;
            const size = board.length;
            const unassignedPercent = parseInt(document.getElementById('unassignedPercent').value) || 0;
            const areas = [];
            const assigned = Array(size).fill(null).map((_, r) =>
                Array(size).fill(false).map((_, c) => board[r][c] === 2)
            );
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];

            // 미할당셀 % 처리: 비검정 셀 중 해당 비율을 영역 할당에서 제외
            if (unassignedPercent > 0) {
                const nonBlackCells = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] !== 2) {
                            nonBlackCells.push([r, c]);
                        }
                    }
                }
                // 셔플
                for (let i = nonBlackCells.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [nonBlackCells[i], nonBlackCells[j]] = [nonBlackCells[j], nonBlackCells[i]];
                }
                const skipCount = Math.floor(nonBlackCells.length * unassignedPercent / 100);
                for (let i = 0; i < skipCount; i++) {
                    const [r, c] = nonBlackCells[i];
                    assigned[r][c] = true; // 영역 할당에서 제외
                }
            }
            
            // 1. 회색 셀을 중심으로 클러스터 형성
            const grayClusters = [];
            const grayVisited = Array(size).fill(null).map(() => Array(size).fill(false));
            
            for (const [gr, gc] of grayCells) {
                if (grayVisited[gr][gc]) continue;
                
                // BFS로 인접한 회색 셀들 찾기
                const cluster = [];
                const queue = [[gr, gc]];
                grayVisited[gr][gc] = true;
                
                while (queue.length > 0 && cluster.length < 10) {
                    const [r, c] = queue.shift();
                    cluster.push([r, c]);
                    
                    for (const [dr, dc] of directions) {
                        const nr = r + dr, nc = c + dc;
                        if (nr >= 0 && nr < size && nc >= 0 && nc < size && 
                            board[nr][nc] === 1 && !grayVisited[nr][nc] && 
                            cluster.length < 10) {
                            grayVisited[nr][nc] = true;
                            queue.push([nr, nc]);
                        }
                    }
                }
                
                if (cluster.length > 0) {
                    grayClusters.push(cluster);
                }
            }
            
            // 2. 회색 클러스터별로 영역 생성 (큰 클러스터는 분할)
            for (const cluster of grayClusters) {
                if (areas.length >= targetAreaCount) break;
                
                // 클러스터가 너무 크면 분할 (작은 보드에서는 더 작은 클러스터도 분할)
                let clusterParts = [cluster];
                const splitThreshold = size <= 5 ? 3 : 6; // 5x5 이하에서는 3셀부터 분할
                const targetParts = Math.min(3, Math.ceil(cluster.length / 3)); // 3개 회색당 1영역
                
                if (cluster.length >= splitThreshold && areas.length + targetParts <= targetAreaCount) {
                    // BFS로 균등하게 분할
                    clusterParts = splitCluster(cluster, targetParts, size);
                }
                
                for (const part of clusterParts) {
                    if (areas.length >= targetAreaCount) break;
                    
                    const areaCells = [...part];
                    
                    // 이미 할당된 셀 제외
                    const validCells = areaCells.filter(([r, c]) => !assigned[r][c]);
                    if (validCells.length === 0) continue;
                    
                    // required 계산: 영역 크기에 비례해서 높은 숫자가 높은 확률로
                    const grayCount = validCells.filter(([r, c]) => board[r][c] === 1).length;
                    const whiteCount = validCells.filter(([r, c]) => board[r][c] === 0).length;
                    const areaSize = validCells.length;
                    
                    let required;
                    if (grayCount === 0 && whiteCount > 0) {
                        required = -1; // J - 자유 영역
                    } else if (grayCount >= areaSize) {
                        required = areaSize - 1; // 최대값 제한
                    } else {
                        // 회색 셀 수를 기준으로 하되, 영역 크기에 비례해서 높은 값이 나올 확률 증가
                        const minRequired = Math.max(1, grayCount);
                        const maxRequired = Math.min(areaSize - 1, Math.ceil(areaSize * 0.8));
                        
                        // 높은 숫자가 나올 확률을 높이기 위한 가중치
                        // areaSize가 클수록 더 높은 값이 나올 확률 증가
                        const sizeBonus = Math.floor(areaSize / 4); // 큰 영역 보너스
                        const baseValue = Math.min(minRequired + sizeBonus, maxRequired);
                        
                        // baseValue ~ maxRequired 사이에서 랜덤 (높은 값에 가중치)
                        const range = maxRequired - baseValue + 1;
                        const randomOffset = Math.floor(Math.random() * range);
                        required = Math.min(baseValue + randomOffset, maxRequired);
                        
                        // 최소 1 보장
                        required = Math.max(1, required);
                    }
                    
                    // 영역 등록
                    for (const [r, c] of validCells) {
                        assigned[r][c] = true;
                    }
                    
                    areas.push({
                        cells: validCells,
                        required: required
                    });
                }
            }
            
            // 클러스터 분할 함수
            function splitCluster(cluster, numParts, size) {
                if (numParts <= 1) return [cluster];
                
                const parts = [];
                const unassigned = new Set(cluster.map(([r, c]) => `${r},${c}`));
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                
                const targetSize = Math.floor(cluster.length / numParts);
                
                for (let i = 0; i < numParts && unassigned.size > 0; i++) {
                    const part = [];
                    // 시작점: 미할당 셀 중 하나
                    const startKey = Array.from(unassigned)[0];
                    const [sr, sc] = startKey.split(',').map(Number);
                    
                    const queue = [[sr, sc]];
                    unassigned.delete(startKey);
                    part.push([sr, sc]);
                    
                    // BFS로 주변 셀 수집
                    while (queue.length > 0 && part.length < targetSize && unassigned.size > 0) {
                        const [r, c] = queue.shift();
                        
                        for (const [dr, dc] of directions) {
                            const nr = r + dr, nc = c + dc;
                            const key = `${nr},${nc}`;
                            if (unassigned.has(key)) {
                                unassigned.delete(key);
                                part.push([nr, nc]);
                                queue.push([nr, nc]);
                                if (part.length >= targetSize) break;
                            }
                        }
                    }
                    
                    if (part.length > 0) {
                        parts.push(part);
                    }
                }
                
                // 남은 셀은 마지막 파트에 추가
                if (unassigned.size > 0 && parts.length > 0) {
                    for (const key of unassigned) {
                        const [r, c] = key.split(',').map(Number);
                        parts[parts.length - 1].push([r, c]);
                    }
                }
                
                return parts.length > 0 ? parts : [cluster];
            }
            
            // 3. 남은 흰색/블랙 셀들을 기존 영역에 병합 또는 새 영역 생성
            const remaining = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (!assigned[r][c] && board[r][c] !== 2) {
                        remaining.push([r, c]);
                    }
                }
            }
            
            // 남은 셀들을 영역 크기에 비례하여 분배 (1번 영역 과잉 방지)
            // 각 영역의 현재 크기 추적
            const areaSizes = areas.map(a => a.cells.length);
            const totalSize = areaSizes.reduce((a, b) => a + b, 0);
            
            for (const [r, c] of remaining) {
                // 가장 작은 영역 우선 할당 (균형 유지)
                let targetAreaIdx = 0;
                let minSize = Infinity;
                let minDist = Infinity;
                
                for (let i = 0; i < areas.length; i++) {
                    const area = areas[i];
                    // 거리 계산
                    let dist = Infinity;
                    for (const [ar, ac] of area.cells) {
                        const d = Math.abs(r - ar) + Math.abs(c - ac);
                        if (d < dist) dist = d;
                    }
                    
                    // 크기와 거리 모두 고려 (작은 영역 우선, 거리 2 이내)
                    if (dist <= 2 && area.cells.length < minSize) {
                        minSize = area.cells.length;
                        minDist = dist;
                        targetAreaIdx = i;
                    }
                }
                
                const targetArea = areas[targetAreaIdx];
                if (minDist <= 2) {
                    targetArea.cells.push([r, c]);
                    if (board[r][c] === 1) {
                        targetArea.required++;
                    }
                    assigned[r][c] = true;
                }
            }
            
            // 4. 영역 크기 균형 조정 (너무 큰 영역 분할, 너무 작은 건 병합)
            const MIN_AREA_SIZE = 2;
            const MAX_AREA_SIZE = 8;
            const balancedAreas = [];
            
            for (const area of areas) {
                if (area.cells.length > MAX_AREA_SIZE) {
                    // 큰 영역 분할
                    const numSplits = Math.ceil(area.cells.length / MAX_AREA_SIZE);
                    const splits = splitCluster(area.cells, numSplits, size);
                    for (const split of splits) {
                        const splitRequired = split.filter(([r, c]) => board[r][c] === 1).length;
                        balancedAreas.push({
                            cells: split,
                            required: splitRequired
                        });
                    }
                } else if (area.cells.length < MIN_AREA_SIZE && balancedAreas.length > 0) {
                    // 작은 영역은 마지막 영역에 병합
                    const lastArea = balancedAreas[balancedAreas.length - 1];
                    if (lastArea.cells.length + area.cells.length <= MAX_AREA_SIZE) {
                        lastArea.cells.push(...area.cells);
                        lastArea.required += area.required;
                    } else {
                        balancedAreas.push(area);
                    }
                } else {
                    balancedAreas.push(area);
                }
            }
            
            const mergedAreas = balancedAreas;
            
            // 5. 검증: 각 셀이 정확히 하나의 영역에만 속하는지 확인
            const cellOwnership = new Map();
            let hasOverlap = false;
            
            for (let i = 0; i < mergedAreas.length; i++) {
                const area = mergedAreas[i];
                for (const [r, c] of area.cells) {
                    const key = `${r},${c}`;
                    if (cellOwnership.has(key)) {
                        // 중복 발견!
                        hasOverlap = true;
                        const prevArea = cellOwnership.get(key);
                        console.error(`셀 [${r},${c}]가 영역 ${prevArea}와 영역 ${i}에 중복됨`);
                    } else {
                        cellOwnership.set(key, i);
                    }
                }
            }
            
            // 6. 중복 제거 (첫 번째 영역만 유지)
            if (hasOverlap) {
                const seen = new Set();
                for (const area of mergedAreas) {
                    area.cells = area.cells.filter(([r, c]) => {
                        const key = `${r},${c}`;
                        if (seen.has(key)) return false;
                        seen.add(key);
                        return true;
                    });
                }
            }
            
            // 연결성 검증: 분리된 셀들은 가장 가까운 영역에 병합
            function isConnected(cells, size) {
                if (cells.length <= 1) return true;
                const cellSet = new Set(cells.map(([r, c]) => `${r},${c}`));
                const visited = new Set();
                const queue = [cells[0]];
                visited.add(`${cells[0][0]},${cells[0][1]}`);
                const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                
                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    for (const [dr, dc] of directions) {
                        const nr = r + dr, nc = c + dc;
                        const key = `${nr},${nc}`;
                        if (cellSet.has(key) && !visited.has(key)) {
                            visited.add(key);
                            queue.push([nr, nc]);
                        }
                    }
                }
                return visited.size === cells.length;
            }
            
            // 분리된 영역 처리
            for (let i = 0; i < mergedAreas.length; i++) {
                const area = mergedAreas[i];
                if (!isConnected(area.cells, size)) {
                    // BFS로 분리된 컴포넌트들 찾기
                    const cellSet = new Set(area.cells.map(([r, c]) => `${r},${c}`));
                    const visited = new Set();
                    const components = [];
                    const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
                    
                    for (const [r, c] of area.cells) {
                        const key = `${r},${c}`;
                        if (visited.has(key)) continue;
                        
                        // 새 컴포넌트 탐색
                        const component = [];
                        const queue = [[r, c]];
                        visited.add(key);
                        
                        while (queue.length > 0) {
                            const [cr, cc] = queue.shift();
                            component.push([cr, cc]);
                            
                            for (const [dr, dc] of directions) {
                                const nr = cr + dr, nc = cc + dc;
                                const nkey = `${nr},${nc}`;
                                if (cellSet.has(nkey) && !visited.has(nkey)) {
                                    visited.add(nkey);
                                    queue.push([nr, nc]);
                                }
                            }
                        }
                        components.push(component);
                    }
                    
                    // 가장 큰 컴포넌트를 원래 영역으로 유지
                    components.sort((a, b) => b.length - a.length);
                    area.cells = components[0];
                    
                    // 나머지 컴포넌트는 가장 가까운 영역에 병합
                    for (let j = 1; j < components.length; j++) {
                        const comp = components[j];
                        let closestArea = null;
                        let minDist = Infinity;
                        
                        for (const otherArea of mergedAreas) {
                            if (otherArea === area && j === 0) continue;
                            for (const [r1, c1] of comp) {
                                for (const [r2, c2] of otherArea.cells) {
                                    const dist = Math.abs(r1 - r2) + Math.abs(c1 - c2);
                                    if (dist < minDist) {
                                        minDist = dist;
                                        closestArea = otherArea;
                                    }
                                }
                            }
                        }
                        
                        if (closestArea) {
                            closestArea.cells.push(...comp);
                            closestArea.required += comp.filter(([r, c]) => board[r][c] === 1).length;
                        }
                    }
                }
            }
            
            // 빈 영역 제거
            let finalAreas = mergedAreas.filter(area => area.cells.length > 0);

            // 너무 적으면: 가장 큰 영역을 2분할
            while (finalAreas.length < targetAreaCount) {
                finalAreas.sort((a, b) => b.cells.length - a.cells.length);
                const big = finalAreas.shift();
                if (big.cells.length < 2) { finalAreas.push(big); break; }
                const halves = splitCluster(big.cells, 2, size);
                for (const half of halves) {
                    finalAreas.push({
                        cells: half,
                        required: half.filter(([r, c]) => board[r][c] === 1).length
                    });
                }
            }

            // 최종 연결성 보장: 분리된 컴포넌트를 개별 영역으로 분리
            const connectedAreas = [];
            for (const area of finalAreas) {
                if (area.cells.length === 0) continue;
                if (isConnected(area.cells, size)) {
                    connectedAreas.push(area);
                } else {
                    const cellSet = new Set(area.cells.map(([r, c]) => `${r},${c}`));
                    const vis = new Set();
                    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                    for (const [r, c] of area.cells) {
                        const key = `${r},${c}`;
                        if (vis.has(key)) continue;
                        const comp = [];
                        const q = [[r, c]]; vis.add(key);
                        while (q.length > 0) {
                            const [cr, cc] = q.shift(); comp.push([cr, cc]);
                            for (const [dr, dc] of dirs) {
                                const nk = `${cr+dr},${cc+dc}`;
                                if (cellSet.has(nk) && !vis.has(nk)) { vis.add(nk); q.push([cr+dr, cc+dc]); }
                            }
                        }
                        connectedAreas.push({ cells: comp, required: comp.filter(([r2,c2]) => board[r2][c2] === 1).length });
                    }
                }
            }
            finalAreas = connectedAreas;

            // 분리 후 다시 수 조정
            while (finalAreas.length > targetAreaCount && finalAreas.length > 2) {
                finalAreas.sort((a, b) => a.cells.length - b.cells.length);
                const small = finalAreas.shift();
                // 1순위: 병합 후 연결되는 가장 가까운 영역
                let connectedIdx = -1, connectedDist = Infinity;
                // 2순위: 그냥 가장 가까운 영역 (폴백)
                let anyIdx = 0, anyDist = Infinity;
                for (let i = 0; i < finalAreas.length; i++) {
                    for (const [r1, c1] of small.cells) {
                        for (const [r2, c2] of finalAreas[i].cells) {
                            const d = Math.abs(r1-r2) + Math.abs(c1-c2);
                            if (d < anyDist) { anyDist = d; anyIdx = i; }
                            if (d < connectedDist) {
                                const merged = [...finalAreas[i].cells, ...small.cells];
                                if (isConnected(merged, size)) { connectedDist = d; connectedIdx = i; }
                            }
                        }
                    }
                }
                const mergeIdx = connectedIdx !== -1 ? connectedIdx : anyIdx;
                finalAreas[mergeIdx].cells.push(...small.cells);
                finalAreas[mergeIdx].required += small.cells.filter(([r,c]) => board[r][c] === 1).length;
            }

            return finalAreas.map(area => ({
                cells: area.cells,
                required: area.required >= 0 ? area.required : -1
            }));
        }

        function renderBoard(solution, areas, initialState) {
            const board = document.getElementById('board');
            const size = solution.board.length;
            
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
            board.innerHTML = '';
            board.style.position = 'relative';
            board.oncontextmenu = (e) => e.preventDefault();
            
            // 영역 맵 생성: 각 셀이 어떤 영역에 속하는지
            const areaMap = Array(size).fill(null).map(() => Array(size).fill(-1));
            areas.forEach((area, idx) => {
                area.cells.forEach(([r, c]) => {
                    areaMap[r][c] = idx;
                });
            });
            
            // 셀 생성
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    const value = initialState[r][c];
                    const areaIdx = areaMap[r][c];
                    
                    // 기본 셀 색상
                    if (value === 0) {
                        cell.classList.add('white');
                        cell.style.background = '#fff';
                    } else if (value === 1) {
                        cell.classList.add('gray');
                        cell.style.background = '#666';
                    } else if (value === 2) {
                        cell.classList.add('black');
                        cell.style.background = '#000';
                    } else {
                        cell.classList.add('empty');
                        cell.style.background = '#1e3a5f';
                    }
                    
                    // 영역 테두리 (RN 스타일: 4방향 개별 설정)
                    if (areaIdx >= 0) {
                        const borderColor = 'deepskyblue'; // RN과 동일한 색상
                        const borderWidth = '5px';
                        
                        // 위쪽: 보드 경계거나 위 셀이 다른 영역이면 표시
                        if (r === 0 || areaMap[r][c] !== areaMap[r - 1]?.[c]) {
                            cell.style.borderTop = `${borderWidth} solid ${borderColor}`;
                        } else {
                            cell.style.borderTop = 'none';
                        }
                        
                        // 아래쪽: 보드 경계거나 아래 셀이 다른 영역이면 표시
                        if (r === size - 1 || areaMap[r][c] !== areaMap[r + 1]?.[c]) {
                            cell.style.borderBottom = `${borderWidth} solid ${borderColor}`;
                        } else {
                            cell.style.borderBottom = 'none';
                        }
                        
                        // 왼쪽: 보드 경계거나 왼쪽 셀이 다른 영역이면 표시
                        if (c === 0 || areaMap[r][c] !== areaMap[r][c - 1]) {
                            cell.style.borderLeft = `${borderWidth} solid ${borderColor}`;
                        } else {
                            cell.style.borderLeft = 'none';
                        }
                        
                        // 오른쪽: 보드 경계거나 오른쪽 셀이 다른 영역이면 표시
                        if (c === size - 1 || areaMap[r][c] !== areaMap[r][c + 1]) {
                            cell.style.borderRight = `${borderWidth} solid ${borderColor}`;
                        } else {
                            cell.style.borderRight = 'none';
                        }
                    }
                    
                    // 숫자 표시 (영역 첫 셀: hover시 +/- 버튼 표시)
                    const areaForLabel = areas.find((a, ai) => a.cells.some(([ar, ac]) => ar === r && ac === c) && a.cells[0][0] === r && a.cells[0][1] === c);
                    const areaForLabelIdx = areaForLabel ? areas.indexOf(areaForLabel) : -1;
                    if (areaForLabel) {
                        cell.style.position = 'relative';
                        const widget = document.createElement('div');
                        widget.className = 'req-widget';

                        if (editModeActive) {
                            const btnUp = document.createElement('button');
                            btnUp.className = 'req-btn';
                            btnUp.textContent = '+';
                            btnUp.addEventListener('click', (e) => { e.stopPropagation(); changeRequired(areaForLabelIdx, 1); });
                            widget.appendChild(btnUp);
                        }

                        const numSpan = document.createElement('span');
                        numSpan.className = 'req-num';
                        numSpan.textContent = areaForLabel.required > 0 ? areaForLabel.required : (editModeActive ? '0' : '');
                        if (!editModeActive && areaForLabel.required <= 0) {
                            // 편집 모드 아닐 때 0은 원래대로 숨김
                        } else {
                            widget.appendChild(numSpan);
                        }

                        if (editModeActive) {
                            const btnDown = document.createElement('button');
                            btnDown.className = 'req-btn';
                            btnDown.textContent = '−';
                            btnDown.addEventListener('click', (e) => { e.stopPropagation(); changeRequired(areaForLabelIdx, -1); });
                            widget.appendChild(btnDown);
                        } else if (areaForLabel.required > 0) {
                            // 편집 모드 아닐 때는 기존 스타일 유지
                            widget.style.opacity = '1';
                            widget.style.pointerEvents = 'none';
                        }

                        cell.appendChild(widget);
                    }

                    // 편집 모드: 셀 클릭 이벤트 및 하이라이트
