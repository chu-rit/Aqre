                    if (editModeActive) {
                        cell.addEventListener('click', (e) => onCellClick(r, c, e));
                        cell.addEventListener('contextmenu', (e) => onCellRightClick(r, c, e));
                        cell.style.cursor = 'pointer';
                        // 선택된 영역 강조
                        if (selectedAreaIdx >= 0 && areaMap[r][c] === selectedAreaIdx) {
                            cell.style.outline = '3px solid yellow';
                            cell.style.outlineOffset = '-3px';
                        }
                        // 영역 색상 오버레이 (반투명)
                        if (areaIdx >= 0) {
                            const overlayColor = AREA_COLORS[areaIdx % AREA_COLORS.length];
                            cell.style.boxShadow = `inset 0 0 0 3px ${overlayColor}88`;
                        }
                    }
                    
                    board.appendChild(cell);
                }
            }
            refreshAreaPalette();
        }

        function updateStats(size, areas, initialState, solution) {
            const stats = document.getElementById('stats');
            const totalCells = size * size;
            const grayCount = solution.grayCells.length;
            const presetCount = initialState.flat().filter(v => v !== -1).length;
            
            stats.innerHTML = `
                <div class="stat-box">
                    <div class="stat-value">${size}x${size}</div>
                    <div class="stat-label">크기</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${areas.length}</div>
                    <div class="stat-label">영역</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${grayCount}</div>
                    <div class="stat-label">회색 셀</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">${presetCount}/${totalCells}</div>
                    <div class="stat-label">프리셋</div>
                </div>
            `;
        }

        function updateValidationStatus(status, message) {
            const statusEl = document.getElementById('validationStatus');
            statusEl.textContent = message;
            
            if (status === 'pending') {
                statusEl.style.background = '#0f3460';
                statusEl.style.color = '#888';
            } else if (status === 'success') {
                statusEl.style.background = '#00d4aa';
                statusEl.style.color = '#1a1a2e';
            } else if (status === 'warning') {
                statusEl.style.background = '#f39c12';
                statusEl.style.color = '#1a1a2e';
            } else if (status === 'error') {
                statusEl.style.background = '#e94560';
                statusEl.style.color = '#fff';
            }
        }

        async function autoVerifyWithRetry(retryCount = 0, genRetryCount = 0, genParams = null) {
            if (!currentPuzzle) return;
            
            updateValidationStatus('pending', `🔍 빈 퍼즐로 Solver 시도 ${retryCount + 1}/${MAX_VERIFICATION_ATTEMPTS}...`);
            log(`빈 퍼즐로 Solver 시도 ${retryCount + 1}/${MAX_VERIFICATION_ATTEMPTS}...`, 'info');
            
            const result = await tryVerify();
            
            if (result.success && result.unique) {
                // 찾은 해답이 현재 initialState와 일치하는지 검증
                const foundSolution = result.solutions[0];
                let matchesInitial = true;
                
                for (let r = 0; r < currentPuzzle.size; r++) {
                    for (let c = 0; c < currentPuzzle.size; c++) {
                        const initialVal = currentPuzzle.initialState[r][c];
                        const solutionVal = foundSolution[r][c];
                        // 고정된 셀(0, 1, 2)이 해답과 다르면 불일치
                        if (initialVal !== -1 && initialVal !== solutionVal) {
                            matchesInitial = false;
                            break;
                        }
                    }
                    if (!matchesInitial) break;
                }
                
                if (!matchesInitial) {
                    updateValidationStatus('error', '❌ 해답 불일치 - 유효하지 않은 퍼즐');
                    log('찾은 해답이 initialState와 불일치! 유효하지 않은 퍼즐입니다.', 'error');
                    return;
                }
                
                // 유일해 발견! 완성된 퍼즐 표시
                updateValidationStatus('success', '✅ 유일해 확인! 완성된 퍼즐 표시...');
                log('유일해 발견! 완성된 퍼즐 표시...', 'success');
                
                // 완성된 해답 표시 (프리셋 없이 전체 표시)
                const solution = genParams?.solution || currentSolution;
                const areas = genParams?.areas || currentPuzzle.areas;
                
                // 해답을 그대로 initialState로 사용 (모두 표시)
                const completedState = foundSolution.map(row => [...row]);
                currentPuzzle.initialState = completedState;
                
                // UI 업데이트
                renderBoard({...solution, board: foundSolution}, areas, completedState);
                updateStats(currentPuzzle.size, areas, completedState, {...solution, board: foundSolution});
                displayPuzzleData();
                
                updateValidationStatus('success', '✅ 유효한 퍼즐 완성! (유일해 보장)');
                document.getElementById('exportBtn').disabled = false;
                log('퍼즐 생성 완료! 유일해 보장됨.', 'success');
                return;
                
            } else if (result.success && !result.unique) {
                updateValidationStatus('warning', '⚠️ 여러 해답 있음');
                log('여러 해답 존재. 영역을 수정하거나 다시 생성하세요.', 'warning');
            } else {
                updateValidationStatus('error', '❌ 해답 없음');
                log('해답 없음. 영역을 수정하거나 다시 생성하세요.', 'error');
            }
        }

        async function tryVerify() {
            const size = currentPuzzle.size;
            const blackCellBitmask = new Array(Math.ceil((size * size) / 32)).fill(0);
            
            // 디버깅: initialState 확인
            log(`검증 시작: size=${size}, areas=${currentPuzzle.areas.length}`, 'info');
            const blackCount = currentPuzzle.initialState.flat().filter(v => v === 2).length;
            const grayCount = currentPuzzle.initialState.flat().filter(v => v === 1).length;
            const whiteCount = currentPuzzle.initialState.flat().filter(v => v === 0).length;
            log(`initialState: 검정=${blackCount}, 회색=${grayCount}, 흰색=${whiteCount}`, 'info');
            
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (currentPuzzle.initialState[r][c] === 2) {
                        const pos = r * size + c;
                        const idx = Math.floor(pos / 32);
                        blackCellBitmask[idx] |= (1 << (pos % 32));
                    }
                }
            }
            
            const request = {
                size: size,
                areas: currentPuzzle.areas.map(a => ({
                    cells: a.cells,
                    required: a.required
                })),
                initialBoard: currentPuzzle.initialState,
                blackCellBitmask: blackCellBitmask,
                maxSolutions: 5
            };
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                
                const result = await response.json();
                
                if (result.solutions && result.solutions.length > 0) {
                    log(`검증 완료: ${result.solutions.length}개 해답 발견`, 'success');
                    return { success: true, unique: result.solutions.length === 1, solutions: result.solutions };
                } else {
                    return { success: false, unique: false, solutions: null };
                }
            } catch (err) {
                log(`API 오류: ${err.message}`, 'error');
                return { success: false, unique: false };
            }
        }

        async function verifyWithSolver() {
            if (!currentPuzzle) {
                log('먼저 퍼즐을 생성하세요', 'error');
                return;
            }
            
            log('Solver API 호출 중...', 'info');
            const result = await tryVerify();
            
            if (result.success) {
                if (result.unique) {
                    log('유일해 보장됨! 완성된 퍼즐 데이터로 업데이트됩니다.', 'success');
                    // 완성된 해답으로 업데이트 (첫 번째 해답 사용)
                    if (result.solutions && result.solutions.length > 0) {
                        const solution = result.solutions[0];
                        // initialState를 완성된 해답으로 교체
                        currentPuzzle.initialState = solution;
                        // currentSolution도 업데이트
                        currentSolution = {
                            board: solution.map(row => [...row]),
                            grayCells: [],
                            blackCells: currentSolution?.blackCells || []
                        };
                        // 회색 셀 카운트 업데이트
                        for (let r = 0; r < currentPuzzle.size; r++) {
                            for (let c = 0; c < currentPuzzle.size; c++) {
                                if (solution[r][c] === 1) {
                                    currentSolution.grayCells.push([r, c]);
                                }
                            }
                        }
                        // 미리보기 업데이트
                        renderBoard(currentSolution, currentPuzzle.areas, solution);
                        updateStats(currentPuzzle.size, currentPuzzle.areas, solution, currentSolution);
                        // 완성된 데이터 표시
                        displayPuzzleData();
                        log('완성된 퍼즐 데이터가 표시됨 (initialState에 해답 값이 포함됨)', 'success');
                    }
                } else {
                    log('경고: 여러 해답 존재 - 완성된 퍼즐로 업데이트하지 않음', 'error');
                }
            } else {
                log('검증 실패: 해답 없음', 'error');
            }
        }

        function displayPuzzleData() {
            if (!currentPuzzle) return;
            
            // Compact format like puzzles.js
            const areasStr = currentPuzzle.areas.map(a => {
                const sorted = [...a.cells].sort((x, y) => x[0] !== y[0] ? x[0] - y[0] : x[1] - y[1]);
                const cellsStr = sorted.map(c => `[${c[0]},${c[1]}]`).join(', ');
                return `            { cells: [${cellsStr}], required: ${a.required} }`;
            }).join(',\n');
            
            // -1을 0으로 변환하여 표시
            const stateStr = currentPuzzle.initialState.map(row => 
                `            [${row.map(v => v === -1 ? 0 : v).join(', ')}]`
            ).join(',\n');
            
            const exportStr = `    {
        id: ${currentPuzzle.id},
        chapter: 1,
        difficulty: ${currentPuzzle.difficulty ?? 1},
        size: ${currentPuzzle.size},
        areas: [
${areasStr}
        ],
        initialState: [
${stateStr}
        ]
    }`;
            
            document.getElementById('exportData').value = exportStr;
        }

        function exportPuzzle() {
            displayPuzzleData();
            log('퍼즐 데이터가 보내기 영역에 표시됨', 'success');
        }

        function loadFromExportData() {
            const exportText = document.getElementById('exportData').value.trim();
            if (!exportText) {
                log('퍼즐 데이터가 비어있습니다', 'error');
                return;
            }
            
            try {
                // JSON 또는 JS 객체 형식 파싱
                let puzzleData;
                try {
                    puzzleData = JSON.parse(exportText);
                } catch (e) {
                    // JS 객체 형식 시도 - 키를 따옴표로 감싸서 JSON처럼 만듦
                    let cleanText = exportText;
                    
                    // id, name, size 등 키에 따옴표 추가
                    cleanText = cleanText.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)(\s*:)/g, '$1"$2"$3');
                    
                    // 줄 끝 쉼표 제거
                    cleanText = cleanText.replace(/,(\s*[}\]])/g, '$1');
                    
                    // 추가/제거된 문자 정리
                    cleanText = cleanText.trim();
                    if (!cleanText.startsWith('{')) cleanText = '{' + cleanText;
                    if (!cleanText.endsWith('}')) cleanText = cleanText + '}';
                    
                    try {
                        puzzleData = JSON.parse(cleanText);
                    } catch (e2) {
                        // 마지막 방법: Function 사용
                        puzzleData = new Function('return ' + exportText)();
                    }
                }
                
                // 필수 필드 검증
                if (!puzzleData.id || !puzzleData.size || !puzzleData.areas || !puzzleData.initialState) {
                    log('퍼즐 데이터 형식이 올바르지 않습니다 (id, size, areas, initialState 필수)', 'error');
                    return;
                }
                
                // currentPuzzle 설정
                const size = puzzleData.size;
                const difficulty = size <= 5 ? 1 : size <= 7 ? 2 : 3;
                currentPuzzle = {
                    id: puzzleData.id,
                    size: size,
                    difficulty: difficulty,
                    areas: puzzleData.areas.filter(a => a.cells.length > 0).map(a => ({
                        cells: a.cells,
                        required: a.required
                    })),
                    initialState: puzzleData.initialState
                };
                
                // 빈 solution 생성 (미리보기용)
                const board = Array(puzzleData.size).fill(null).map(() => Array(puzzleData.size).fill(-1));
                const blackCells = [];
                for (let r = 0; r < puzzleData.size; r++) {
                    for (let c = 0; c < puzzleData.size; c++) {
                        if (puzzleData.initialState[r][c] === 2) {
                            blackCells.push([r, c]);
                            board[r][c] = 0;
                        } else if (puzzleData.initialState[r][c] === 0 || puzzleData.initialState[r][c] === 1) {
                            board[r][c] = puzzleData.initialState[r][c];
                        }
                    }
                }
                currentSolution = { board, grayCells: [], blackCells };
                
                // 미리보기 표시
                renderBoard(currentSolution, currentPuzzle.areas, currentPuzzle.initialState);
                updateStats(currentPuzzle.size, currentPuzzle.areas, currentPuzzle.initialState, currentSolution);
                
                // 버튼 활성화
                document.getElementById('solveBtn').disabled = false;
                document.getElementById('exportBtn').disabled = false;
                
                log('퍼즐 데이터 로드 완료. Solver 검증을 시작합니다...', 'success');
                
                // 디버깅: 로드된 데이터 확인
                const loadedBlack = currentPuzzle.initialState.flat().filter(v => v === 2).length;
                const loadedGray = currentPuzzle.initialState.flat().filter(v => v === 1).length;
                const loadedWhite = currentPuzzle.initialState.flat().filter(v => v === 0).length;
                log(`로드된 데이터: 검정=${loadedBlack}, 회색=${loadedGray}, 흰색=${loadedWhite}`, 'info');
                
                // 자동 Solver 검증 시작
                setTimeout(() => verifyWithSolver(), 100);
                
            } catch (e) {
                log(`데이터 파싱 오류: ${e.message}`, 'error');
            }
        }

        function copyExportData() {
            const textarea = document.getElementById('exportData');
            textarea.select();
            document.execCommand('copy');
            log('퍼즐 데이터가 클립보드에 복사되었습니다', 'success');
        }

        async function findAndShowSolution() {
            if (!currentPuzzle) {
                log('먼저 퍼즐을 생성하거나 로드하세요', 'error');
                return;
            }

            log('답 찾기 시작...', 'info');
            updateValidationStatus('pending', '🔍 답 찾는 중...');

            const progressEl = document.getElementById('solveProgress');
            let progressTimer = null;
            progressEl.textContent = '';
            progressTimer = setInterval(async () => {
                try {
                    const pRes = await fetch('http://localhost:5000/api/progress');
                    const pData = await pRes.json();
                    if (pData.status === 'running') {
                        const t = pData.elapsedTime.toFixed(1);
                        const iter = pData.iterations.toLocaleString();
                        const depth = pData.currentDepth != null ? pData.currentDepth : '?';
                        const total = pData.emptyCellTotal != null ? pData.emptyCellTotal : '?';
                        const bt = pData.backtracks != null ? pData.backtracks.toLocaleString() : '0';
                        const sols = pData.solutionsFound != null ? pData.solutionsFound : 0;
                        progressEl.textContent = `⏱ ${t}초 | 반복 ${iter} | 깊이 ${depth}/${total} | 백트랙 ${bt} | 해답 ${sols}개`;
                    }
                } catch(e) {}
            }, 500);

            const size = currentPuzzle.size;
            const strippedBoard = currentPuzzle.initialState.map(row =>
                row.map(v => v === 2 ? 2 : -1)
            );
            const blackCellBitmask = new Array(Math.ceil((size * size) / 32)).fill(0);
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (strippedBoard[r][c] === 2) {
                        const pos = r * size + c;
                        blackCellBitmask[Math.floor(pos / 32)] |= (1 << (pos % 32));
                    }
                }
            }
            const request = {
                size,
                areas: currentPuzzle.areas.map(a => ({ cells: a.cells, required: a.required })),
                initialBoard: strippedBoard,
                blackCellBitmask,
                maxSolutions: 5
            };

            let result;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(request)
                });
                const json = await response.json();
                if (json.solutions && json.solutions.length > 0) {
                    result = { success: true, unique: json.solutions.length === 1, solutions: json.solutions, difficultyLabel: json.difficultyLabel, difficultyScore: json.difficultyScore };
                } else {
                    result = { success: false };
                }
            } catch (err) {
                log(`API 오류: ${err.message}`, 'error');
                result = { success: false };
            }

            clearInterval(progressTimer);

            if (result.success && result.solutions && result.solutions.length > 0) {
                allFoundSolutions = result.solutions;
                currentSolutionIdx = 0;
                showSolution(0);

                const uniqueText = result.unique ? '(유일해)' : `(${result.solutions.length}개 해답 발견)`;
                const diffText = result.difficultyLabel ? ` - 난이도: ${result.difficultyLabel} (${result.difficultyScore})` : '';
                updateValidationStatus(result.unique ? 'success' : 'warning', `✅ 해답 표시됨 ${uniqueText}${diffText}`);
                log(`해답 표시 완료 ${uniqueText}${diffText}`, 'success');
                renderSolutionNav();
            } else {
                allFoundSolutions = [];
                updateValidationStatus('error', '❌ 해답 없음');
                log('해답을 찾을 수 없습니다', 'error');
                renderSolutionNav();
            }
        }

        function showSolution(idx) {
            if (!currentPuzzle || !allFoundSolutions[idx]) return;
            const solution = allFoundSolutions[idx];
            const solBoard = {
                board: solution.map(row => [...row]),
                grayCells: [],
                blackCells: []
            };
            for (let r = 0; r < currentPuzzle.size; r++) {
                for (let c = 0; c < currentPuzzle.size; c++) {
                    if (solution[r][c] === 1) solBoard.grayCells.push([r, c]);
                    if (solution[r][c] === 2) solBoard.blackCells.push([r, c]);
                }
            }
            currentSolution = solBoard;
            renderBoard(solBoard, currentPuzzle.areas, solution);
            updateStats(currentPuzzle.size, currentPuzzle.areas, solution, solBoard);
        }

        function renderSolutionNav() {
            let nav = document.getElementById('solutionNav');
            if (!nav) {
                nav = document.createElement('div');
                nav.id = 'solutionNav';
                nav.style.cssText = 'display:flex;gap:4px;align-items:center;margin-top:4px;flex-wrap:wrap;';
                const btnRow = document.getElementById('undoBtn').parentElement;
                btnRow.parentElement.insertBefore(nav, btnRow.nextSibling);
            }
            nav.innerHTML = '';
            if (allFoundSolutions.length <= 1) return;

            const label = document.createElement('span');
            label.style.cssText = 'font-size:11px;color:#888;';
            label.textContent = `해답 ${allFoundSolutions.length}개:`;
            nav.appendChild(label);

            allFoundSolutions.forEach((sol, i) => {
                const btn = document.createElement('button');
                btn.className = 'tool-btn' + (i === currentSolutionIdx ? ' active' : '');
                btn.textContent = `#${i + 1}`;
                btn.style.padding = '3px 8px';

                btn.addEventListener('click', () => {
                    currentSolutionIdx = i;
                    showSolution(i);
                    renderSolutionNav();
                });
                btn.addEventListener('mouseenter', () => showSolution(i));
                btn.addEventListener('mouseleave', () => showSolution(currentSolutionIdx));

                nav.appendChild(btn);
            });
        }

        // =============================================
        // 직접 편집 기능
        // =============================================
        let editModeActive = true;
        let editTool = 'cell'; // 'cell' | 'area'
        let selectedAreaIdx = -1; // 영역 편집 시 선택된 영역
        let editHistory = []; // undo 스택
        const AREA_COLORS = [
            '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
            '#3498db','#9b59b6','#e91e63','#00bcd4','#8bc34a',
            '#ff5722','#607d8b','#795548','#cddc39','#ff9800'
        ];

        function toggleEditMode() {}

        function setEditMode(mode) {
            editTool = 'area';
            selectedAreaIdx = -1;
            refreshAreaPalette();
            if (currentPuzzle) reRenderBoard();
        }

        function refreshAreaPalette() {
            if (!currentPuzzle) return;
            const palette = document.getElementById('areaPalette');
            palette.innerHTML = '';

            // 미할당(-1) 칩
            const unassigned = document.createElement('div');
            unassigned.className = 'area-chip' + (selectedAreaIdx === -2 ? ' selected' : '');
            unassigned.style.cssText = 'background:#1e3a5f;color:#888;border-color:#2a4a7f;';
            unassigned.textContent = '미할당';
            unassigned.onclick = () => { selectedAreaIdx = -2; refreshAreaPalette(); reRenderBoard(); };
            palette.appendChild(unassigned);

            currentPuzzle.areas.forEach((area, idx) => {
                const chip = document.createElement('div');
                chip.className = 'area-chip' + (selectedAreaIdx === idx ? ' selected' : '');
                const color = AREA_COLORS[idx % AREA_COLORS.length];
                chip.style.cssText = `background:${color};color:#fff;`;
                chip.textContent = `A${idx + 1}(${area.required >= 0 ? area.required : 'J'})`;
                chip.onclick = () => { selectedAreaIdx = idx; refreshAreaPalette(); reRenderBoard(); };
                palette.appendChild(chip);
            });
        }

        function saveHistory() {
            if (!currentPuzzle) return;
            editHistory.push({
                initialState: currentPuzzle.initialState.map(r => [...r]),
                areas: currentPuzzle.areas.map(a => ({ cells: a.cells.map(c => [...c]), required: a.required }))
            });
            if (editHistory.length > 30) editHistory.shift();
            // 각 영역의 셀 좌표 정렬 (row, col 오름차순)
            currentPuzzle.areas.forEach(a => {
                a.cells.sort((x, y) => x[0] !== y[0] ? x[0] - y[0] : x[1] - y[1]);
            });
            // 수정 발생 시 해답 표시 초기화
            allFoundSolutions = [];
            currentSolutionIdx = 0;
            renderSolutionNav();
        }

        function undoEdit() {
            if (editHistory.length === 0) { log('실행 취소할 내용이 없습니다', 'info'); return; }
            const prev = editHistory.pop();
            currentPuzzle.initialState = prev.initialState;
            currentPuzzle.areas = prev.areas;
            reRenderBoard();
            refreshAreaPalette();
            log('실행 취소됨', 'info');
        }

        function applyEditAndSync() {
            displayPuzzleData();
            updateValidationStatus('pending', '✏️ 수동 편집됨 - Solver 검증 필요');
            log('편집 내용이 퍼즐 데이터에 반영됨. Solver 검증을 실행하세요.', 'success');
        }

        function reRenderBoard() {
            if (!currentPuzzle || !currentSolution) return;
            currentPuzzle.areas = currentPuzzle.areas.filter(a => a.cells.length > 0);
            const sol = { board: currentPuzzle.initialState.map(r => [...r]), grayCells: [], blackCells: [] };
            for (let r = 0; r < currentPuzzle.size; r++)
                for (let c = 0; c < currentPuzzle.size; c++) {
                    if (currentPuzzle.initialState[r][c] === 1) sol.grayCells.push([r, c]);
                    if (currentPuzzle.initialState[r][c] === 2) sol.blackCells.push([r, c]);
                }
            currentSolution = sol;
            renderBoard(sol, currentPuzzle.areas, currentPuzzle.initialState);
            displayPuzzleData();
            if (isTestMode) checkGameRules();
        }

        function checkGameRules() {
            if (!currentPuzzle) return;
            const board = currentPuzzle.initialState;
            const size = currentPuzzle.size;
            const areas = currentPuzzle.areas;

            // 1. 4연속 검사
            let has4Consecutive = false;
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size - 3; c++) {
                    const v = board[r][c];
                    if (v === 0 || v === 1) {
                        if (board[r][c+1] === v && board[r][c+2] === v && board[r][c+3] === v) {
                            has4Consecutive = true; break;
                        }
                    }
                }
                if (has4Consecutive) break;
            }
            if (!has4Consecutive) {
                for (let c = 0; c < size; c++) {
                    for (let r = 0; r < size - 3; r++) {
                        const v = board[r][c];
                        if (v === 0 || v === 1) {
                            if (board[r+1][c] === v && board[r+2][c] === v && board[r+3][c] === v) {
                                has4Consecutive = true; break;
                            }
                        }
                    }
                    if (has4Consecutive) break;
                }
            }
            updateRuleItem('rule4Consecutive', !has4Consecutive);

            // 2. 영역 회색 수 검사
            let areaViolation = false;
            for (const area of areas) {
                if (area.required < 0) continue;
                const grayCount = area.cells.filter(([r, c]) => board[r][c] === 1).length;
                const emptyCount = area.cells.filter(([r, c]) => board[r][c] === -1).length;
                if (emptyCount === 0 && grayCount !== area.required) {
                    areaViolation = true; break;
                }
                if (grayCount > area.required) {
                    areaViolation = true; break;
                }
                if (grayCount + emptyCount < area.required) {
                    areaViolation = true; break;
                }
            }
            updateRuleItem('ruleAreaRequired', !areaViolation);

            // 3. 회색 연결성 검사
            const grayCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 1) grayCells.push([r, c]);
                }
            }
            let connected = true;
            if (grayCells.length > 1) {
                const visited = new Set();
                const queue = [grayCells[0]];
                visited.add(`${grayCells[0][0]},${grayCells[0][1]}`);
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                while (queue.length > 0) {
                    const [r, c] = queue.shift();
                    for (const [dr, dc] of dirs) {
                        const nr = r + dr, nc = c + dc;
                        const key = `${nr},${nc}`;
                        if (nr >= 0 && nr < size && nc >= 0 && nc < size &&
                            board[nr][nc] === 1 && !visited.has(key)) {
                            visited.add(key);
                            queue.push([nr, nc]);
                        }
                    }
                }
                connected = visited.size === grayCells.length;
            }
            updateRuleItem('ruleConnectivity', connected);
        }

        function updateRuleItem(id, ok) {
            const el = document.getElementById(id);
            if (!el) return;
            el.className = 'rule-item ' + (ok ? 'ok' : 'violation');
            el.querySelector('.rule-icon').textContent = ok ? '✓' : '✗';
        }

        function onCellClick(r, c, e) {
            if (!currentPuzzle) return;
            e.stopPropagation();

            if (isTestMode) {
                // 게임 모드: 셀 클릭으로 0/1 전환 (검정 셀은 무시)
                const cur = currentPuzzle.initialState[r][c];
                if (cur === 2) return;
                currentPuzzle.initialState[r][c] = cur === 1 ? 0 : 1;
                reRenderBoard();
                return;
            }

            if (!editModeActive) return;
            if (selectedAreaIdx === -1) { log('먼저 영역을 선택하세요', 'info'); return; }
            saveHistory();

            if (selectedAreaIdx === -2) {
                currentPuzzle.areas.forEach(a => {
                    a.cells = a.cells.filter(([cr, cc]) => !(cr === r && cc === c));
                });
            } else {
                const targetArea = currentPuzzle.areas[selectedAreaIdx];
                const alreadyIn = targetArea.cells.some(([cr, cc]) => cr === r && cc === c);
                if (alreadyIn) {
                    targetArea.cells = targetArea.cells.filter(([cr, cc]) => !(cr === r && cc === c));
                } else {
                    currentPuzzle.areas.forEach(a => {
                        a.cells = a.cells.filter(([cr, cc]) => !(cr === r && cc === c));
                    });
                    targetArea.cells.push([r, c]);
                }
                if (targetArea.required > 0) targetArea.required = Math.min(targetArea.required, targetArea.cells.length - (targetArea.cells.length > 0 ? 1 : 0));
            }
            reRenderBoard();
            refreshAreaPalette();
        }

        function regenAreas() {
            if (!currentPuzzle || !currentSolution) { log('먼저 퍼즐을 생성하세요', 'error'); return; }
            const btn = document.getElementById('regenAreasBtn');
            btn.disabled = true;
            try {
                saveHistory();
                const inputVal = parseInt(document.getElementById('areaCount').value);
                const targetCount = (inputVal > 0) ? inputVal : currentPuzzle.areas.length;
                const board = currentSolution.board;
                const size = board.length;
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

                // 비검정 셀 목록 (랜덤 섞기)
                let cells = [];
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++)
                        if (board[r][c] !== 2) cells.push([r, c]);
                cells.sort(() => Math.random() - 0.5);

                // BFS로 연결된 덩어리 하나씩 할당
                const assigned = Array.from({length: size}, () => Array(size).fill(false));
                // 검정 셀은 처음부터 assigned
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++)
                        if (board[r][c] === 2) assigned[r][c] = true;

                const rawAreas = [];
                const totalCells = cells.length;
                const baseSize = Math.max(1, Math.floor(totalCells / targetCount));

                for (let i = 0; i < targetCount; i++) {
                    // 미할당 시작점 찾기
                    let start = null;
                    for (const [r, c] of cells) {
                        if (!assigned[r][c]) { start = [r, c]; break; }
                    }
                    if (!start) break;

                    // 마지막 영역이면 남은 셀 전부
                    const quota = (i === targetCount - 1)
                        ? Infinity
                        : baseSize + (i < (totalCells % targetCount) ? 1 : 0);

                    const areaCells = [];
                    const queue = [start];
                    assigned[start[0]][start[1]] = true;

                    while (queue.length > 0 && areaCells.length < quota) {
                        const [r, c] = queue.shift();
                        areaCells.push([r, c]);
                        // 인접 미할당 셀 추가 (랜덤 순서)
                        const neighbors = dirs
                            .map(([dr, dc]) => [r+dr, c+dc])
                            .filter(([nr, nc]) => nr>=0 && nr<size && nc>=0 && nc<size && !assigned[nr][nc])
                            .sort(() => Math.random() - 0.5);
                        for (const [nr, nc] of neighbors) {
                            if (areaCells.length + queue.length < quota && !assigned[nr][nc]) {
                                assigned[nr][nc] = true;
                                queue.push([nr, nc]);
                            }
                        }
                    }

                    if (areaCells.length > 0) {
                        const grayCount = areaCells.filter(([r, c]) => board[r][c] === 1).length;
                        const whiteCount = areaCells.filter(([r, c]) => board[r][c] === 0).length;
                        const areaSize = areaCells.length;
                        let required;
                        if (grayCount === 0 && whiteCount > 0) {
                            required = -1; // J
                        } else if (grayCount >= areaSize) {
                            required = areaSize - 1;
                        } else {
                            const minRequired = Math.max(1, grayCount);
                            const maxRequired = Math.min(areaSize - 1, Math.ceil(areaSize * 0.8));
                            const sizeBonus = Math.floor(areaSize / 4);
                            const baseValue = Math.min(minRequired + sizeBonus, maxRequired);
                            const range = Math.max(1, maxRequired - baseValue + 1);
                            required = Math.max(1, baseValue + Math.floor(Math.random() * range));
                        }
                        rawAreas.push({ cells: areaCells, required });
                    }
                }

                // 미할당 셀은 영역에 편입하지 않음 (영역 없는 셀로 남음)

                if (rawAreas.length < 1) { log('영역 재생성 실패', 'error'); return; }

                currentPuzzle.areas = rawAreas.filter(a => a.cells.length > 0);
                reRenderBoard();
                refreshAreaPalette();
                log(`영역 재설정 완료 (${rawAreas.length}개)`, 'success');
            } catch(e) {
                log(`영역 재설정 오류: ${e.message}`, 'error');
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        async function autoTryRequired() {
            if (!currentPuzzle) { log('먼저 퍼즐을 생성하세요', 'error'); return; }
            const btn = document.getElementById('autoTryBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 시도 중...';

            const size = currentPuzzle.size;
            const originalAreas = currentPuzzle.areas.map(a => ({ ...a, cells: a.cells.map(c => [...c]) }));

            for (let attempt = 1; attempt <= 30; attempt++) {
                log(`반복시도 ${attempt}/30...`, 'info');
                // required 랜덤 변경
                saveHistory();
                currentPuzzle.areas = originalAreas.map(a => {
                    if (a.cells.length === 1) {
                        return { ...a, cells: a.cells.map(c => [...c]), required: Math.floor(Math.random() * 2) };
                    }
                    const grayCount = a.cells.filter(([r, c]) => currentPuzzle.initialState[r][c] === 1).length;
                    const minReq = Math.max(1, grayCount);
                    const maxReq = a.cells.length;
                    const range = maxReq - minReq;
                    // 낮은 값에 가중치: 1-sqrt(random)으로 낮은 쪽 확률 높임
                    const newReq = range === 0 ? minReq : minReq + Math.floor((1 - Math.sqrt(Math.random())) * (range + 1));
                    return { ...a, cells: a.cells.map(c => [...c]), required: newReq };
                });
                reRenderBoard();
                refreshAreaPalette();

                // 답 찾기
                const request = {
                    size,
                    areas: currentPuzzle.areas.map(a => ({ cells: a.cells, required: a.required })),
                    initialBoard: currentPuzzle.initialState.map(row => row.map(v => v === 2 ? 2 : -1)),
                    blackCellBitmask: new Array(Math.ceil((size * size) / 32)).fill(0),
                    maxSolutions: 2
                };
                for (let r = 0; r < size; r++)
                    for (let c = 0; c < size; c++)
                        if (currentPuzzle.initialState[r][c] === 2) {
                            const pos = r * size + c;
                            request.blackCellBitmask[Math.floor(pos / 32)] |= (1 << (pos % 32));
                        }

                let result;
                try {
                    const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(request) });
                    const json = await response.json();
                    result = json.solutions?.length > 0 ? json : null;
                } catch(e) { result = null; }

                if (result?.solutions?.length === 1) {
                    allFoundSolutions = result.solutions;
                    currentSolutionIdx = 0;
                    showSolution(0);
                    renderSolutionNav();
                    const diffLabel = result.difficultyLabel || '-';
                    const diffScore = result.difficultyScore ?? '-';
                    updateValidationStatus('success', `✅ 유일해 발견! (${attempt}번째 시도) - 난이도: ${diffLabel} (${diffScore})`);
                    log(`유일해 발견! (${attempt}번째 시도) - 난이도: ${diffLabel} (${diffScore})`, 'success');
                    btn.disabled = false;
                    btn.textContent = '🔄 반복시도';
                    return;
                }
            }

            log('30회 시도 후 유일해를 찾지 못했습니다.', 'warning');
            updateValidationStatus('warning', '⚠️ 유일해 미발견 (30회 시도)');
            btn.disabled = false;
            btn.textContent = '🔄 반복시도';
        }

        function onCellRightClick(r, c, e) {
            if (!currentPuzzle) return;
            e.preventDefault();
            e.stopPropagation();

            if (isTestMode) {
                // 게임 모드: 우클릭으로 빈칸(-1) 리셋 (검정 셀은 무시)
                const cur = currentPuzzle.initialState[r][c];
                if (cur === 2) return;
                currentPuzzle.initialState[r][c] = -1;
                reRenderBoard();
                return;
            }

            if (!editModeActive) return;
            saveHistory();
            const cur = currentPuzzle.initialState[r][c];
            currentPuzzle.initialState[r][c] = (cur === 2) ? 0 : 2;
            reRenderBoard();
        }

        function changeRequired(areaIdx, delta) {
            if (!currentPuzzle) return;
            const area = currentPuzzle.areas[areaIdx];
            saveHistory();
            area.required = Math.max(0, Math.min(area.cells.length, (area.required || 0) + delta));
            reRenderBoard();
            refreshAreaPalette();
            displayPuzzleData();
        }

        function addNewArea() {
            if (!currentPuzzle) return;
            saveHistory();
            currentPuzzle.areas.push({ cells: [], required: 1 });
            selectedAreaIdx = currentPuzzle.areas.length - 1;
            refreshAreaPalette();
            log(`새 영역 A${currentPuzzle.areas.length} 추가됨. 셀을 클릭해 영역에 추가하세요.`, 'success');
        }

        function deleteSelectedArea() {
            if (!currentPuzzle || selectedAreaIdx < 0) { log('삭제할 영역을 선택하세요', 'info'); return; }
            saveHistory();
            currentPuzzle.areas.splice(selectedAreaIdx, 1);
            selectedAreaIdx = -1;
            refreshAreaPalette();
            reRenderBoard();
            log('영역 삭제됨', 'success');
        }

        function mergeSelectedAreaCells() {
            log('셀을 클릭해 선택된 영역에 추가/제거하세요', 'info');
        }

        // =============================================
        let isTestMode = false;
        function toggleTestMode() {
            isTestMode = !isTestMode;
            document.body.classList.toggle('game-mode', isTestMode);
            const btn = document.querySelector('.mode-toggle');
            btn.textContent = isTestMode ? '게임 모드' : '제작 모드';
            
            if (isTestMode) {
                log('제작 모드로 전환. 퍼즐 데이터를 입력하고 "미리보기 및 검증"을 누르세요.', 'info');
                if (currentPuzzle) checkGameRules();
            } else {
                log('게임 모드로 전환', 'info');
            }
        }
    </script>
